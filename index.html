<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madi Freck — Animation Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="hero">
    <!-- Top hand-drawn swoosh / arrow -->
    <img class="swoosh swoosh--top" src="images/arrow-top.svg" alt="" />

    <div class="name-row">
      <!-- Left hand-drawn star -->
      <img class="star star--left" src="images/star-left.svg" alt="" />

      <h1 class="name">Madi Freck</h1>

      <!-- Right hand-drawn star -->
      <img class="star star--right" src="images/star-right.svg" alt="" />
    </div>

    <!-- Bottom hand-drawn swoosh / arrow -->
    <img class="swoosh swoosh--bottom" src="images/arrow-bottom.svg" alt="" />

    <!-- Placeholder profile picture -->
    <div class="profile">
      <img src="images/profile.svg" alt="Portrait of Madi Freck" />
    </div>

    <p class="role">2D &amp; Stop-Motion Animator</p>
    <p class="university">Teesside University</p>
  </main>
</body>
</html>
